services:
  - type: web
    name: ims-backend
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ims-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          name: ims-redis
          type: redis
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app
      - key: ALLOWED_HOSTS
        value: ims-backend.onrender.com

databases:
  - name: ims-postgres
    databaseName: inventory_db
    user: ims_user
    plan: free
